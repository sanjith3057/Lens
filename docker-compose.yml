version: '3.8'
services:
  leon-rag:
    build: .
    environment:
      GROQ_VISION_API_KEY: ${GROQ_VISION_API_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://localhost:11434}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/logs
    restart: unless-stopped
    depends_on:
      - ollama
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
